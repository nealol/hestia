name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Formatting, clippy, tests, and the package build, all as flake checks.
  #
  # Also the dogfood job: with the HESTIA_DOGFOOD repository variable set
  # to "true", these derivations are cached through hestia itself (the
  # latest published release), so cache breakage shows up as slow or
  # failing CI. The daemon is bootstrapped from a released binary (this
  # job cannot use the package it is about to build); with the variable
  # unset the dogfood step is skipped.
  build:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    permissions:
      # GHA cache writes when dogfooding is enabled.
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: NixOS/nix-installer-action@main
      - name: Start hestia cache (dogfood)
        if: vars.HESTIA_DOGFOOD == 'true'
        uses: ./
      - name: Run flake checks
        run: nix flake check --print-build-logs
      # No-op after the flake checks; asserts the closures the dependent
      # jobs substitute are complete and pushed.
      - name: Assert package closures are complete
        run: nix build .# .#gha-real-tests --no-link

  # Proves the action wrapper makes the GHA cache tokens visible to shell
  # steps and that the results endpoint is reachable. The real-API
  # integration tests then round-trip a blob through the actual GHA cache
  # (Twirp reserve/finalize, Azure PUT/Range GET) and manage entries via
  # the REST API.
  token-probe:
    runs-on: ubuntu-latest
    # The build job pushes the gha-real-tests closure to the cache.
    needs: build
    permissions:
      # actions:write is needed by the REST delete test
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: NixOS/nix-installer-action@main
      # Dogfood substituter, so the nix build below substitutes instead of
      # compiling. Must run before the token-only invocation below.
      - name: Start hestia cache (dogfood)
        if: vars.HESTIA_DOGFOOD == 'true'
        uses: ./
      # Explicitly empty binary/version: token-capture-only mode (must
      # stay tested). version defaults to "latest" when omitted.
      - uses: ./
        with:
          version: ""
      - name: Assert cache tokens are visible to shell steps
        run: |
          set -euo pipefail
          if [ -z "${ACTIONS_RUNTIME_TOKEN:-}" ]; then
            echo "ACTIONS_RUNTIME_TOKEN is empty; token capture failed" >&2
            exit 1
          fi
          if [ -z "${ACTIONS_RESULTS_URL:-}" ]; then
            echo "ACTIONS_RESULTS_URL is empty; token capture failed" >&2
            exit 1
          fi
          echo "Both cache tokens captured successfully."
      - name: Probe cache results endpoint
        run: |
          set -euo pipefail
          # Any HTTP response (even 401/404) proves the endpoint is reachable;
          # only a connection failure (curl reports 000) is an error.
          code=$(curl -s -o /dev/null -w '%{http_code}' "$ACTIONS_RESULTS_URL")
          echo "GET $ACTIONS_RESULTS_URL -> HTTP $code"
          if [ "$code" = "000" ]; then
            echo "Could not reach $ACTIONS_RESULTS_URL" >&2
            exit 1
          fi
      - name: Run real-API integration tests
        # Fork PRs always get a read-only GITHUB_TOKEN regardless of the
        # permissions block above, so the REST delete assertion would 403.
        # Skip the real-API roundtrip there; the fake-API tests in the
        # build job still cover the same code paths.
        if: github.event.pull_request.head.repo.fork != true
        run: |
          set -euo pipefail
          nix build .#gha-real-tests -o gha-real-tests
          ./gha-real-tests/bin/gha-real-tests --ignored --nocapture
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # Read-only GC with the PR-built binary against the real cache. The
  # nightly gc.yml run uses the released binary, so without this job GC
  # bugs would only show up after a release.
  gc-dry-run:
    runs-on: ubuntu-latest
    # The build job pushes the package closure to the cache.
    needs: build
    permissions:
      # REST cache listing; a dry run never deletes.
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: NixOS/nix-installer-action@main
      # Substituter for the nix build below; also exports the cache tokens
      # GC needs to read manifests.
      - name: Start hestia cache (dogfood)
        if: vars.HESTIA_DOGFOOD == 'true'
        uses: ./
      # Token-capture-only mode when dogfooding is off (forks). Explicitly
      # empty version: it defaults to "latest" when omitted, which would
      # start an unwanted daemon.
      - uses: ./
        if: vars.HESTIA_DOGFOOD != 'true'
        with:
          version: ""
      - name: Build hestia
        run: nix build .# -o hestia-bin
      - name: Run GC (dry run)
        run: ./hestia-bin/bin/hestia gc --dry-run
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # End-to-end test of the hestia-cache action on a real runner: install
  # (locally built binary), nix.conf wiring, daemon readiness, post-build-hook
  # capture, manifest commit, and substitution back out of the cache.
  action-test:
    strategy:
      fail-fast: false
      matrix:
        runner: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.runner }}
    # The build job pushes the package closure to the cache.
    needs: build
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: NixOS/nix-installer-action@main
      # Dogfood substituter, so the nix build below substitutes instead of
      # compiling (forks without the variables build from source).
      - name: Start hestia cache (dogfood)
        if: vars.HESTIA_DOGFOOD == 'true'
        uses: ./
      - name: Build hestia
        run: nix build .# -o hestia-bin
      # Instance under test on its own port/socket, started last: the
      # HESTIA_* variables and the post-build-hook then point at it.
      - uses: ./
        with:
          binary: ./hestia-bin/bin/hestia
          listen: 127.0.0.1:37516
          socket: /tmp/hestia-test/hook.sock
      - name: Build a run-unique derivation through the post-build-hook
        run: |
          set -euo pipefail
          # runId makes the derivation unique per run, so it is always built
          # locally (never substituted) and the hook must fire. $runId and
          # $out are expanded by the Nix builder, not by this shell (quoted
          # heredoc); the workflow expression is substituted by the runner.
          cat > /tmp/action-test.nix <<'NIXEOF'
          derivation {
            name = "hestia-action-test";
            system = builtins.currentSystem;
            builder = "/bin/sh";
            runId = "${{ github.run_id }}-${{ github.run_attempt }}";
            args = [ "-c" "echo $runId > $out" ];
          }
          NIXEOF
          nix build --impure --file /tmp/action-test.nix -o ./action-test-result
      - name: Drain and verify the path is substitutable
        run: |
          set -euo pipefail
          # Drain now (instead of waiting for the post step) so this job can
          # assert the path actually round-trips through the GHA cache.
          "$HESTIA_BIN" drain --socket "$HESTIA_SOCKET" --timeout 120

          path=$(readlink -f ./action-test-result)
          hash=$(basename "$path" | cut -c1-32)
          echo "narinfo for $path:"
          curl -fsS "http://$HESTIA_LISTEN/$hash.narinfo"

          # Nix itself is the oracle: copy the path out of hestia into a
          # fresh store. Not /tmp: on macOS it is a symlink, which nix
          # rejects for store parents.
          fresh_store="$RUNNER_TEMP/fresh-store"
          nix copy --no-check-sigs \
            --from "http://$HESTIA_LISTEN" \
            --to "$fresh_store" \
            "$path"
          test -e "$fresh_store$path"
