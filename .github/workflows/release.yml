# Release pipeline: tag push -> static binaries -> GitHub release.
#
# The binaries are statically linked (musl, see packages.static in
# flake.nix): the hestia-cache action downloads and runs them on stock
# runners, where dynamically linked nix-built binaries would not work
# (their library paths point into /nix/store).
name: Release

on:
  push:
    tags: ["v*"]
  # Manual dry runs: build the binaries without creating a release, so the
  # build can be debugged without re-pushing tags.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      # One architecture failing should not cancel the other; partial
      # results make failures easier to debug.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    permissions:
      # GHA cache writes when dogfooding is enabled.
      actions: write
      contents: read
      # Build provenance attestations for the release binaries.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
      - uses: NixOS/nix-installer-action@main
      # Cache the static toolchain and build through hestia itself (same
      # repository variables as ci.yml). Note GHA cache scoping: a tag
      # build READS the default branch scope but its writes land in the
      # tag's own scope, which no later tag can see. To make releases
      # fast, seed main's scope once by running this workflow via
      # workflow_dispatch (dry run on main) after the nixpkgs pin or the
      # toolchain changes.
      - name: Start hestia cache (dogfood)
        if: vars.HESTIA_DOGFOOD == 'true'
        uses: ./action
        with:
          version: ${{ vars.HESTIA_DOGFOOD_VERSION }}
          sha256: ${{ matrix.system == 'aarch64-linux' && vars.HESTIA_DOGFOOD_SHA256_AARCH64 || vars.HESTIA_DOGFOOD_SHA256 }}
      - name: System diagnostics
        run: |
          uname -a
          nproc
          free -h
          swapon --show || true
          df -h
      - name: Build static binary
        # The arm64 runner has died with "The runner has received a
        # shutdown signal" in every release run so far: 60-130s after job
        # start, across three Azure regions (eastus2, westus2, westus3),
        # once even before any build had started. Stream kernel messages,
        # memory/disk headroom, and Azure scheduled events (IMDS) during
        # the build, so the next death shows whether the cause is OOM,
        # disk exhaustion, or VM preemption.
        run: |
          sudo dmesg --follow --nopager 2>/dev/null | sed 's/^/[dmesg] /' &
          (
            while true; do
              mem=$(awk '/MemAvailable/{printf "%.1f", $2/1048576}' /proc/meminfo)
              disk=$(df -BG --output=avail / | tail -1 | tr -d ' G')
              load=$(cut -d' ' -f1-3 /proc/loadavg)
              echo "[monitor $(date -u +%H:%M:%S)] mem_avail=${mem}G disk_avail=${disk}G load=${load}"
              # Azure maintenance/preemption notice for this VM, if any.
              ev=$(curl -sf --max-time 2 -H Metadata:true \
                "http://169.254.169.254/metadata/scheduledevents?api-version=2020-07-01" || true)
              case "$ev" in
                "" | *'"Events":[]'*) ;;
                *) echo "[monitor] AZURE SCHEDULED EVENT: $ev" ;;
              esac
              sleep 10
            done
          ) &
          # Background monitors hold stdout open; kill them when the build
          # exits or the step would hang forever.
          trap 'kill $(jobs -p) 2>/dev/null || true' EXIT
          nix build .#static
      - name: Prepare release asset
        run: |
          set -euo pipefail
          install -m755 result/bin/hestia "hestia-${{ matrix.system }}"
          sha256sum "hestia-${{ matrix.system }}" | tee "hestia-${{ matrix.system }}.sha256"
      # Publish build provenance so the hestia-cache action can verify
      # downloaded binaries against GitHub's attestation API instead of
      # requiring users to pin a sha256.
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-path: hestia-${{ matrix.system }}
      - uses: actions/upload-artifact@v7
        with:
          name: hestia-${{ matrix.system }}
          path: |
            hestia-${{ matrix.system }}
            hestia-${{ matrix.system }}.sha256
          if-no-files-found: error

  release:
    needs: build
    # workflow_dispatch runs are dry runs: build only, no release.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      # Creating the release and uploading assets.
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Pre-1.0 / hyphenated tags (v0.1.0-alpha.1) are pre-releases.
          prerelease=()
          case "$tag" in
            *-*) prerelease=(--prerelease) ;;
          esac

          # Release notes: usage snippet with the real sha256 values, so the
          # release is copy-paste usable; --generate-notes appends the
          # auto-generated changelog below it.
          sha256_x86_64=$(cut -d' ' -f1 hestia-x86_64-linux.sha256)
          sha256_aarch64=$(cut -d' ' -f1 hestia-aarch64-linux.sha256)
          cat > notes.md <<EOF
          > ⚠️ **Alpha software**: APIs, cache format, and behavior may change without notice.

          ## Usage

          \`\`\`yaml
          - uses: Mic92/hestia/action@${tag}
            with:
              version: ${tag}
              sha256: ${sha256_x86_64}   # x86_64-linux
          \`\`\`

          ## Checksums (SHA-256)

          | Asset | Digest |
          |---|---|
          | hestia-x86_64-linux | \`${sha256_x86_64}\` |
          | hestia-aarch64-linux | \`${sha256_aarch64}\` |
          EOF

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file notes.md \
            --generate-notes \
            "${prerelease[@]}" \
            hestia-*
