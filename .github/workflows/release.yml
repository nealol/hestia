# Release pipeline: tag push -> static binaries -> GitHub release.
#
# The binaries are statically linked (musl, see packages.static in
# flake.nix): the hestia-cache action downloads and runs them on stock
# runners, where dynamically linked nix-built binaries would not work
# (their library paths point into /nix/store).
name: Release

on:
  push:
    tags: ["v*"]
  # Manual dry runs: build the binaries without creating a release, so the
  # build can be debugged without re-pushing tags.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      # One architecture failing should not cancel the other; partial
      # results make failures easier to debug.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      # The hosted runners (especially arm64) have little free disk; the
      # musl cross toolchain plus the cargo build fills the root filesystem
      # and the runner agent dies with "received a shutdown signal".
      # Removing preinstalled toolchains we never use frees several GB.
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
            "$AGENT_TOOLSDIRECTORY" || true
      # Swap absorbs rustc memory spikes that previously OOM-killed the
      # 16 GB runner VMs. zram is compressed RAM-backed swap: unlike a disk
      # swapfile it costs zero disk space (an 8 GB /swapfile made the
      # disk-exhaustion failure above strictly worse).
      - name: Enable zram swap
        run: |
          sudo modprobe zram
          echo 8G | sudo tee /sys/block/zram0/disksize
          sudo mkswap /dev/zram0
          sudo swapon -p 100 /dev/zram0
      - uses: NixOS/nix-installer-action@main
      - name: Resource diagnostics
        run: |
          df -h
          free -h
          swapon --show
      - name: Build static binary
        run: |
          # Background monitor: if the runner dies mid-build, the last
          # samples in the log show whether disk or memory ran out.
          (while true; do
            echo "--- monitor $(date -u +%T) ---"; df -h /; free -m
            sleep 15
          done) &
          trap 'kill %1' EXIT
          nix build .#static --cores 2
      - name: Prepare release asset
        run: |
          set -euo pipefail
          install -m755 result/bin/hestia "hestia-${{ matrix.system }}"
          sha256sum "hestia-${{ matrix.system }}" | tee "hestia-${{ matrix.system }}.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: hestia-${{ matrix.system }}
          path: |
            hestia-${{ matrix.system }}
            hestia-${{ matrix.system }}.sha256
          if-no-files-found: error

  release:
    needs: build
    # workflow_dispatch runs are dry runs: build only, no release.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      # Creating the release and uploading assets.
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Pre-1.0 / hyphenated tags (v0.1.0-alpha.1) are pre-releases.
          prerelease=()
          case "$tag" in
            *-*) prerelease=(--prerelease) ;;
          esac

          # Release notes: usage snippet with the real sha256 values, so the
          # release is copy-paste usable; --generate-notes appends the
          # auto-generated changelog below it.
          sha256_x86_64=$(cut -d' ' -f1 hestia-x86_64-linux.sha256)
          sha256_aarch64=$(cut -d' ' -f1 hestia-aarch64-linux.sha256)
          cat > notes.md <<EOF
          > ⚠️ **Alpha software**: APIs, cache format, and behavior may change without notice.

          ## Usage

          \`\`\`yaml
          - uses: Mic92/hestia/action@${tag}
            with:
              version: ${tag}
              sha256: ${sha256_x86_64}   # x86_64-linux
          \`\`\`

          ## Checksums (SHA-256)

          | Asset | Digest |
          |---|---|
          | hestia-x86_64-linux | \`${sha256_x86_64}\` |
          | hestia-aarch64-linux | \`${sha256_aarch64}\` |
          EOF

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file notes.md \
            --generate-notes \
            "${prerelease[@]}" \
            hestia-*
