# Release pipeline: tag push -> static binaries -> GitHub release.
#
# The binaries must run on stock runners without nix: Linux binaries are
# statically linked (musl); darwin binaries link only system libraries
# (nix-built dynamic binaries would point into /nix/store).
name: Release

on:
  push:
    tags: ["v*"]
  # Manual dry runs: build the binaries without creating a release, so the
  # build can be debugged without re-pushing tags.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      # One architecture failing should not cancel the other; partial
      # results make failures easier to debug.
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
          - runner: macos-latest
            system: aarch64-darwin
    runs-on: ${{ matrix.runner }}
    permissions:
      # GHA cache writes when dogfooding is enabled.
      actions: write
      contents: read
      # Build provenance attestations for the release binaries.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v7
      - uses: NixOS/nix-installer-action@main
      # Cache the static toolchain and build through hestia itself (same
      # repository variables as ci.yml). Note GHA cache scoping: a tag
      # build READS the default branch scope but its writes land in the
      # tag's own scope, which no later tag can see. To make releases
      # fast, seed main's scope once by running this workflow via
      # workflow_dispatch (dry run on main) after the nixpkgs pin or the
      # toolchain changes.
      - name: Start hestia cache (dogfood)
        if: vars.HESTIA_DOGFOOD == 'true'
        uses: ./
      - name: Build release binary
        run: nix build .#
      - name: Prepare release asset
        run: install -m755 result/bin/hestia "hestia-${{ matrix.system }}"
      # Publish build provenance so the hestia-cache action can verify
      # downloaded binaries against GitHub's attestation API instead of
      # requiring users to pin a sha256.
      - uses: actions/attest-build-provenance@v4
        if: startsWith(github.ref, 'refs/tags/')
        with:
          subject-path: hestia-${{ matrix.system }}
      - uses: actions/upload-artifact@v7
        with:
          name: hestia-${{ matrix.system }}
          path: hestia-${{ matrix.system }}
          if-no-files-found: error

  release:
    needs: build
    # workflow_dispatch runs are dry runs: build only, no release.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      # Creating the release and uploading assets.
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Pre-1.0 / hyphenated tags (v0.1.0-alpha.1) are pre-releases.
          prerelease=()
          case "$tag" in
            *-*) prerelease=(--prerelease) ;;
          esac

          # Draft release: usage snippet + auto-generated changelog, pruned
          # by hand before publishing. Binaries are verified via build
          # attestations (gh attestation verify), so no checksums.
          cat > notes.md <<EOF
          This is alpha software. The cache format and behavior can change
          between releases; a format change means the cache starts out empty
          after an upgrade.

          ## Usage

          \`\`\`yaml
          - uses: Mic92/hestia@${tag}
            with:
              version: ${tag}
          \`\`\`
          EOF

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file notes.md \
            --generate-notes \
            --draft \
            "${prerelease[@]}" \
            hestia-*
