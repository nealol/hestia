# Daemon profiling on demand: build hestia with debug info, push a real
# package closure through the daemon and substitute it back out, record
# both with perf, and upload the flamegraphs as a workflow artifact.
name: Perf

on:
  workflow_dispatch:
    inputs:
      workload:
        description: >
          Workload size: "small" is a few package closures (~200 MiB),
          "iso" builds a NixOS installer ISO closure (several GiB) to
          stress-test drain and substitution throughput.
        type: choice
        options: [small, iso]
        default: small

permissions:
  contents: read

jobs:
  flamegraph:
    runs-on: ubuntu-latest
    permissions:
      # The profiled daemon writes to the GHA cache.
      actions: write
      contents: read
    env:
      # Per-run cache namespace: every run drains into an empty cache and
      # never touches the production cache CI dogfoods. Salted entries
      # expire via GitHub's normal eviction.
      HESTIA_CACHE_VERSION_SALT: ${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v7
      - uses: NixOS/nix-installer-action@main
      # rust-cache derives its cache key from `rustc -vV`, so the devshell
      # toolchain has to be on PATH before it runs.
      - name: Expose the devshell toolchain
        run: nix develop --command which rustc | xargs dirname >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
        with:
          # The toolchain is pinned by the flake; a nixpkgs bump must not
          # reuse artifacts from the old compiler.
          prefix-key: perf-${{ hashFiles('flake.lock') }}
      - name: Build hestia with debug info
        # The nix package strips debug info; perf needs it for DWARF
        # unwinding and symbol names.
        run: nix develop --command env CARGO_PROFILE_RELEASE_DEBUG=2 cargo build --release
      - name: Start hestia cache
        uses: ./
        with:
          binary: target/release/hestia
      - name: Install perf
        run: |
          set -euo pipefail
          sudo apt-get update -q
          sudo apt-get install -qy linux-tools-common "linux-tools-$(uname -r)" ||
            sudo apt-get install -qy linux-tools-common linux-tools-generic
          # Allow profiling other processes and resolving kernel symbols.
          sudo sysctl kernel.perf_event_paranoid=-1 kernel.kptr_restrict=0
          perf --version
      - name: Build workload
        # Substituted paths never trigger the post-build-hook, so the roots
        # go to the daemon via the hook command.
        run: |
          case "${{ inputs.workload }}" in
            iso)
              nix build --inputs-from . --impure --expr '
                let nixpkgs = builtins.getFlake "nixpkgs"; in
                (nixpkgs.lib.nixosSystem {
                  system = "x86_64-linux";
                  modules = [
                    (nixpkgs.outPath
                     + "/nixos/modules/installer/cd-dvd/installation-cd-minimal.nix")
                  ];
                }).config.system.build.isoImage' \
                -o ./workload
              ;;
            *)
              nix build --inputs-from . \
                nixpkgs#python3 nixpkgs#git nixpkgs#nodejs -o ./workload
              ;;
          esac
          readarray -t roots < <(readlink -f ./workload*)
          nix path-info -Sh "${roots[@]}"
          "$HESTIA_BIN" hook --socket "$HESTIA_SOCKET" "${roots[@]}"
      # Push direction: chunking, packing, uploading, manifest commit.
      - name: Profile the drain
        run: |
          bin/profile.sh start
          "$HESTIA_BIN" drain --socket "$HESTIA_SOCKET" --timeout 600
          nix shell --inputs-from . nixpkgs#inferno \
            --command bin/profile.sh stop drain-flamegraph.svg
      # Serve direction: pack range reads, chunk decompression, NAR
      # reassembly. The fresh store forces real substitution of the paths
      # the drain just uploaded.
      - name: Profile substitution of the same paths
        run: |
          bin/profile.sh start
          readarray -t roots < <(readlink -f ./workload*)
          nix copy --no-check-sigs \
            --from "http://$HESTIA_LISTEN" \
            --to /tmp/fresh-store \
            "${roots[@]}"
          nix shell --inputs-from . nixpkgs#inferno \
            --command bin/profile.sh stop substitute-flamegraph.svg
      - uses: actions/upload-artifact@v7
        with:
          name: flamegraphs
          path: "*-flamegraph.svg"
          if-no-files-found: error
